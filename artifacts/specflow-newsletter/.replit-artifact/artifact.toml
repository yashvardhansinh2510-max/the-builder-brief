kind = "web"
previewPath = "/"
title = "SpecFlow AI Newsletter"
version = "1.0.0"
id = "artifacts/specflow-newsletter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19527

[services.development]
run = "pnpm --filter @workspace/specflow-newsletter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/specflow-newsletter", "run", "build" ]
publicDir = "artifacts/specflow-newsletter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19527"
BASE_PATH = "/"
